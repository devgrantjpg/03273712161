<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Page</title>
    <style>
        /* Make the background cover the entire page */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://example.com/your-background.jpg'); /* Replace with your image URL */
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
        }

        /* Style the link as a button */
        .game-link {
            display: inline-block;
            padding: 20px 40px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 24px;
            text-decoration: none;
            border-radius: 12px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .game-link:hover {
            background-color: rgba(255, 0, 0, 0.8);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Replace the href with your Google Drive share link -->
    <a class="game-link" href="https://drive.google.com/file/d/1_PQ8VoE-1amaNjTxWLL9N1jdkl9Vyqdu/view?usp=sharing" target="_blank">
        Download
    </a>
</body>
</html>
