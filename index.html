<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hire a Software Developer</title>

  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #7c7cff;
      --bg-dark: #0b0f1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #141a33, var(--bg-dark));
      color: white;
      overflow-x: hidden;
    }

    /* ================= HEADER ================= */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(11, 15, 26, 0.6);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav a {
      color: white;
      text-decoration: none;
      margin-left: 1.5rem;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .nav a:hover {
      opacity: 1;
    }

    .signin-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: #0b0f1a;
      font-weight: 600;
    }

    /* ================= HERO ================= */
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 6rem;
    }

    .card {
      padding: 4rem;
      max-width: 720px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin-bottom: 1rem;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav class="nav">
      <div class="logo">Software Dev</div>
      <div>
        <a href="contact.html">Contact</a>
        <a href="signin.html" class="signin-btn">Sign In</a>
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <section class="container">
    <div class="card">
      <h1>Hire a Software Developer</h1>
      <p>
        Build scalable and beautiful software,
        from idea to production.
      </p>
    </div>
  </section>

</body>
</html>
