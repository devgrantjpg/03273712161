<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Realty</title>

  <style>
    :root {
      --primary: #f77f00;   /* warm orange */
      --secondary: #d62828; /* deep red */
      --text-light: #f9fafb;
      --text-muted: #d1d5db;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text-light);
    }

    /* ================= HEADER ================= */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--secondary);
    }

    .nav a {
      color: #1f2933;
      text-decoration: none;
      margin-left: 1.5rem;
      font-weight: 500;
    }

    .signin-btn {
      padding: 0.55rem 1.3rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white;
      font-weight: 600;
    }

    /* ================= HERO ================= */
    .hero {
      min-height: 100vh;
      background:
        linear-gradient(
          rgba(0, 0, 0, 0.5),
          rgba(0, 0, 0, 0.5)
        ),
        url("./coolstreet.png");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7rem 1.5rem 2rem;
    }

    /* ================= CARD ================= */
    .card {
      padding: 2.6rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;

      /* Faded / translucent black gradient */
      background: linear-gradient(
        180deg,
        rgba(15, 15, 18, 0.78),
        rgba(27, 27, 34, 0.78)
      );

      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      border-radius: 22px;
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      margin-bottom: 1rem;
      background: linear-gradient(
        90deg,
        #ffffff,
        var(--primary)
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    p {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 2.2rem;
      line-height: 1.65;
    }

    .cta-btn {
      display: inline-block;
      padding: 0.85rem 2.1rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 14px 36px rgba(247, 127, 0, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 44px rgba(247, 127, 0, 0.5);
    }

    /* ================= MOBILE ================= */
    @media (max-width: 600px) {
      .card {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav class="nav">
      <div class="logo">SMVM</div>
      <div>
        <!-- <a href="listings.html">Listings</a>
        <a href="contact.html">Contact</a>
        <a href="signin.html" class="signin-btn">Client Login</a> -->
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="card">
      <h1>Find Your Vacation Home</h1>
      <p>
        Explore beautiful homes in vibrant neighborhoods
        Contact Us to Book in advance.
      </p>
      <a href="listings.html" class="cta-btn">Conntact Us</a>
    </div>
  </section>

</body>
</html>
