<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hire a Software Developer</title>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #7c7cff;
      --bg-dark: #0b0f1a;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:"Inter", system-ui, sans-serif; }
    body { background: radial-gradient(circle at top, #141a33, var(--bg-dark)); color:white; }

    header {
      position: fixed; top:0; width:100%; z-index:10;
      backdrop-filter: blur(12px);
      background: rgba(11,15,26,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding:1rem 2rem;
      display:flex; justify-content:space-between; align-items:center;
    }
    .logo { font-weight:700; font-size:1.2rem; background:linear-gradient(90deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav a { color:white; text-decoration:none; margin-left:1rem; opacity:0.85; }
    .signin-btn { padding:0.5rem 1rem; border-radius:999px; background:linear-gradient(90deg,var(--primary),var(--secondary)); color:#0b0f1a; font-weight:600; }

    .hero { min-height:100vh; display:flex; justify-content:center; align-items:center; padding-top:5rem; text-align:center; }
    .hero h1 { font-size:clamp(2.5rem,5vw,4rem); background:linear-gradient(90deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:1rem; }
    .hero p { font-size:1.1rem; opacity:0.85; line-height:1.6; }

    .scroller { display:flex; overflow-x:auto; scroll-behavior:smooth; padding:2rem; gap:2rem; }
    .card { min-width:300px; height:400px; border-radius:20px; overflow:hidden; flex-shrink:0; background-size:cover; background-position:center; position:relative; cursor:pointer; transition: transform 0.3s; }
    .card:hover { transform:scale(1.03); }
    .card .label { position:absolute; bottom:1rem; left:1rem; background:rgba(0,0,0,0.5); padding:0.5rem 1rem; border-radius:12px; }
    .card h3 { margin-bottom:0.3rem; font-size:1.3rem; }
    .card span { font-size:0.9rem; opacity:0.9; color:#fff; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Dev Games</div>
    <div class="nav">
      <a href="#">Contact</a>
      <a href="#"></a>
    </div>
  </header>

  <section class="hero">
    <div>
      <h1>Dev Studio Zombies</h1>
      <p>Smooth gameplay cool maps pixelstyle zombies!</p>
    </div>
    <button><div><a href="index2.html"></a></div></button>
  </section>
  
    
  

  <section>
    <div class="scroller" id="scroller">
      <!-- Cards will appear here -->
    </div>
  </section>
